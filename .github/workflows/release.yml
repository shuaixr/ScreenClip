name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version without the leading v, for example 1.2.3
        required: true
        type: string
      tag_name:
        description: Optional tag name. Defaults to v<version>.
        required: false
        type: string

permissions:
  contents: write

jobs:
  meta:
    name: Prepare release tag
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.meta.outputs.tag_name }}
      tag_created: ${{ steps.meta.outputs.tag_created }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute tag
        id: meta
        run: |
          tag_name="${{ inputs.tag_name }}"
          if [ -z "$tag_name" ]; then
            tag_name="v${{ inputs.version }}"
          fi
          echo "tag_name=$tag_name" >> "$GITHUB_OUTPUT"

          if git rev-parse --verify "refs/tags/$tag_name" >/dev/null 2>&1; then
            echo "tag_created=false" >> "$GITHUB_OUTPUT"
          elif git ls-remote --tags origin "refs/tags/$tag_name" | grep -q .; then
            git fetch origin "refs/tags/$tag_name:refs/tags/$tag_name"
            echo "tag_created=false" >> "$GITHUB_OUTPUT"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "$tag_name" -m "Release $tag_name"
            echo "tag_created=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Push new tag
        if: steps.meta.outputs.tag_created == 'true'
        run: git push origin "${{ steps.meta.outputs.tag_name }}"

  package:
    name: Package ${{ matrix.target }}
    needs: meta
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: windows-x64
            formats: nsis
          - os: ubuntu-latest
            target: linux-x64
            formats: deb,appimage
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config \
            libgtk-3-dev libglib2.0-dev \
            libayatana-appindicator3-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libdbus-1-dev \
            libxdo-dev \
            file \
            wget

      - name: Install cargo-packager
        run: cargo install cargo-packager --locked

      - name: Build production binary
        run: cargo build --release --verbose

      - name: Build installers
        run: cargo packager build --release --formats ${{ matrix.formats }} --verbose

      - name: Stage Windows NSIS installer
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $tagName = "${{ needs.meta.outputs.tag_name }}"
          $exe = Get-ChildItem -Path "target/release/bundle/nsis" -Filter "*.exe" |
            Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $exe) { throw "NSIS .exe not found under target/release/bundle/nsis" }
          $asset = "screenclip-$tagName-${{ matrix.target }}-setup.exe"
          Copy-Item -Path $exe.FullName -Destination $asset -Force

      - name: Stage Linux packages
        if: matrix.os == 'ubuntu-latest'
        run: |
          tag_name="${{ needs.meta.outputs.tag_name }}"
          cd target/release/bundle
          [ -f deb/*.deb ] && cp deb/*.deb "screenclip-${tag_name}-${{ matrix.target }}.deb"
          [ -f appimage/*.AppImage ] && cp appimage/*.AppImage "screenclip-${tag_name}-${{ matrix.target }}.AppImage"
          ls -la

      - name: Upload staged assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ matrix.target }}
          path: |
            *-setup.exe
            *.deb
            *.AppImage

  release:
    name: Publish GitHub release
    needs: [meta, package]
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows assets
        uses: actions/download-artifact@v4
        with:
          name: release-assets-windows-x64
          path: dist/windows

      - name: Download Linux assets
        uses: actions/download-artifact@v4
        with:
          name: release-assets-linux-x64
          path: dist/linux

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.meta.outputs.tag_name }}
        run: |
          set -e
          mapfile -t files < <(find dist -type f \( -name '*-setup.exe' -o -name '*.deb' -o -name '*.AppImage' \) -print)
          echo "Attaching: ${files[@]}"
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "${files[@]}" --clobber
          else
            gh release create "$TAG_NAME" "${files[@]}" --title "$TAG_NAME" --generate-notes
          fi